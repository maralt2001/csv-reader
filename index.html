<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV Reader</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="header-logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="8" y1="13" x2="16" y2="13"/>
      <line x1="8" y1="17" x2="16" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>CSV Reader</h1>
    <p class="subtitle">Lokaler CSV-Viewer · JSON-Erkennung · Regex-Suche</p>
  </div>
  <div class="header-badge">
    <span class="badge-local">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
      lokal
    </span>
  </div>
</header>

<div id="tab-bar">
  <!-- dynamisch befüllt: .tab-item > .tab-label + button.tab-close -->
  <button id="add-tab-btn" title="Weitere Datei öffnen">+</button>
</div>

<main>

  <!-- Drop Zone -->
  <div id="drop-zone">
    <div class="drop-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <polyline points="9 15 12 12 15 15"/>
      </svg>
    </div>
    <h2>CSV-Datei hierherziehen</h2>
    <p>oder <span class="browse-link" id="browse-btn">Datei auswählen</span></p>
    <p class="hint">Unterstützt RFC 4180 CSV · JSON-Objekte und Arrays in Zellen werden erkannt</p>
  </div>
  <input type="file" id="file-input" accept=".csv,.txt" multiple>

  <!-- File Info -->
  <div id="file-info">
    <span class="file-info-name">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <strong id="info-name">—</strong>
    </span>
    <span class="sep">|</span>
    <span><strong id="info-rows">0</strong> Zeilen</span>
    <span class="sep">|</span>
    <span><strong id="info-cols">0</strong> Spalten</span>
    <span class="sep">|</span>
    <span id="info-delim"></span>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <label for="search-input" class="sr-only">Suche</label>
      <input type="text" id="search-input" placeholder="In allen Spalten suchen …">
      <label class="regex-toggle" id="regex-label" title="Reguläre Ausdrücke aktivieren">
        <input type="checkbox" id="regex-checkbox">
        <span>.*</span>
      </label>
    </div>
    <button class="styled-btn styled-btn-gray" id="toggle-cols-btn">
      <span class="styled-btn-inner">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>
        Spalten
      </span>
    </button>
    <button class="styled-btn styled-btn-gray" id="global-search-btn">
      <span class="styled-btn-inner">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        Alle Tabs
      </span>
    </button>
    <div class="export-wrap">
      <button class="styled-btn styled-btn-primary" id="export-btn">
        <span class="styled-btn-inner">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </span>
      </button>
      <div class="export-menu" id="export-menu">
        <button id="export-csv">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Als CSV exportieren
        </button>
        <button id="export-json">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Als JSON exportieren
        </button>
      </div>
    </div>
    <button class="styled-btn styled-btn-red" id="clear-btn">
      <span class="styled-btn-inner">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Schließen
      </span>
    </button>
  </div>

  <!-- Column Toggle Panel -->
  <div id="col-panel">
    <h3>Spalten ein-/ausblenden</h3>
    <div class="col-toggles" id="col-toggles"></div>
  </div>

  <!-- Global Search Panel -->
  <div id="global-panel">
    <div class="global-search-bar">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <label for="global-input" class="sr-only">Globale Suche</label>
        <input type="text" id="global-input" placeholder="In allen Tabs suchen …">
        <label class="regex-toggle" title="Reguläre Ausdrücke">
          <input type="checkbox" id="global-regex">
          <span>.*</span>
        </label>
      </div>
      <button class="styled-btn styled-btn-primary" id="global-run-btn">
        <span class="styled-btn-inner">Suchen</span>
      </button>
      <button class="styled-btn styled-btn-gray" id="global-close-btn">
        <span class="styled-btn-inner">✕ Schließen</span>
      </button>
    </div>
    <div id="global-results"></div>
  </div>

  <!-- Table + Detail Panel -->
  <div id="table-area">
    <div id="table-wrap">
      <table id="data-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <div id="detail-panel">
      <div id="detail-header">
        <span id="detail-title">Zeile</span>
        <button id="detail-close" title="Schließen">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>

  <!-- Pagination Bar -->
  <div id="pagination-bar">
    <button id="page-prev" class="styled-btn styled-btn-gray"><span class="styled-btn-inner">← Zurück</span></button>
    <span id="page-info">Seite 1 von 1</span>
    <button id="page-next" class="styled-btn styled-btn-gray"><span class="styled-btn-inner">Weiter →</span></button>
    <label for="page-size-select" class="sr-only">Zeilen pro Seite</label>
    <select id="page-size-select">
      <option value="50">50 Zeilen</option>
      <option value="100" selected>100 Zeilen</option>
      <option value="250">250 Zeilen</option>
      <option value="all">Alle</option>
    </select>
  </div>

  <!-- Status Bar -->
  <div id="status-bar">
    <span id="status-left"></span>
    <span id="status-right"></span>
  </div>

</main>

<!-- JSON Modal -->
<div id="json-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div id="json-modal-box">
    <div id="json-modal-header">
      <span id="modal-title">JSON</span>
      <button id="modal-close" title="Schließen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <pre id="modal-content"></pre>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
